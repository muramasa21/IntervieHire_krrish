services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: interviehire
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file: ../.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/interviehire?schema=public
      - REDIS_URL=redis://redis:6379
    ports: ["4000:4000"]
    depends_on: [postgres, redis]
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    env_file: ../.env
    ports: ["3000:3000"]
    depends_on: [api]
volumes:
  postgres_data:
